<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📄 本地 PDF/PPTX/Google簡報 轉文字工具 - 極速本地隱私工具箱</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { 
            font-family: sans-serif; 
            max-width: 800px; 
            margin: 20px auto; 
            padding: 20px; 
            line-height: 1.6; 
            background-color: #1a1a1a; 
            color: #e0e0e0; 
        }
        .container { 
            border: 1px solid #333; 
            padding: 20px; 
            border-radius: 8px; 
            background-color: #242424; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
        h2 {
            margin-top: 0;
            color: #ffffff;
        }
        .status { 
            color: #aaa; 
            font-style: italic; 
            margin: 10px 0; 
        }
        .form-group { 
            margin: 20px 0; 
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        .form-group:last-of-type {
            border-bottom: none;
        }
        .form-group label { 
            display: block;
            margin-bottom: 8px; 
            font-weight: bold; 
            color: #b0b0b0;
        }
        input[type="file"] { 
            background: #333;
            color: #fff;
            padding: 8px;
            border: 1px solid #555;
            border-radius: 4px;
            max-width: 100%;
        }
        input::file-selector-button {
            background: #444;
            color: #fff;
            border: 1px solid #666;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            transition: background 0.2s;
        }
        input::file-selector-button:hover {
            background: #555;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #3993ff;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button { 
            padding: 10px 20px; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            transition: background 0.2s;
        }
        .btn-primary { background-color: #28a745; }
        .btn-primary:hover:not(:disabled) { background-color: #218838; }
        .btn-google { background-color: #4285F4; }
        .btn-google:hover:not(:disabled) { background-color: #357ae8; }
        
        button:disabled { 
            background-color: #555 !important; 
            color: #aaa; 
            cursor: not-allowed; 
        }
        .result-section {
            margin-top: 25px;
        }
        textarea {
            width: 100%;
            height: 300px;
            background-color: #1e1e1e;
            color: #f0f0f0;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 12px;
            box-sizing: border-box;
            resize: vertical;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
        }
        textarea:focus {
            outline: none;
            border-color: #3993ff;
            box-shadow: 0 0 5px rgba(57, 147, 255, 0.5);
        }
        .privacy-tip {
            font-size: 13px;
            color: #ffc107;
            background-color: rgba(255, 193, 7, 0.1);
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            border-left: 4px solid #ffc107;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📄 本地 PDF/PPTX/Google簡報 轉文字工具</h2>
        <div class="privacy-tip">
            🛡️ <b>安全提示：</b>本工具為 100% 純前端本地運算。強烈建議在<b>「瀏覽器無痕模式」</b>下使用，以防止瀏覽器外掛讀取記憶體或產生殘留。
        </div>
        
        <p>狀態：<span id="status" class="status">等待處理檔案...</span></p>

        <div class="form-group">
            <label for="uploader">【方法一】選取本地 PDF 或 PPTX 檔案：</label>
            <input type="file" id="uploader" accept=".pdf,.pptx">
        </div>

        <div class="form-group">
            <label for="googleUrl">【方法二】輸入 Google 簡報共用網址：</label>
            <input type="text" id="googleUrl" placeholder="https://docs.google.com/presentation/d/.../edit...">
        </div>

        <div class="btn-group">
            <button id="extractBtn" class="btn-primary" disabled>開始提取純文字</button>
            <button id="googleBtn" class="btn-google">從 Google 簡報匯入並提取</button>
        </div>

        <div class="result-section">
            <label style="font-weight: bold; display: block; margin-bottom: 8px; color: #b0b0b0;">提取結果：</label>
            <textarea id="outputText" placeholder="提取出來的文字將會顯示在這裡..." readonly></textarea>
        </div>
    </div>

    <script>
        // 請在此處填入您在 Google Cloud Console 申請的 Client ID
        const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';

        const uploader = document.getElementById('uploader');
        const googleUrlInput = document.getElementById('googleUrl');
        const extractBtn = document.getElementById('extractBtn');
        const googleBtn = document.getElementById('googleBtn');
        const statusText = document.getElementById('status');
        const outputText = document.getElementById('outputText');

        let tokenClient;
        let accessToken = null;
        let currentMode = 'local'; // 'local' 或 'google'

        // 監聽本地檔案選取狀態
        uploader.addEventListener('change', () => {
            if (uploader.files.length > 0) {
                extractBtn.disabled = false;
                googleUrlInput.value = ''; // 清空另一個輸入框避免混淆
                statusText.innerText = `已選取本地檔案：${uploader.files[0].name}`;
                currentMode = 'local';
            } else {
                extractBtn.disabled = true;
                statusText.innerText = "等待處理檔案...";
            }
        });

        // 監聽網址輸入狀態（若有輸入，清空本地上傳）
        googleUrlInput.addEventListener('input', () => {
            if (googleUrlInput.value.trim() !== '') {
                uploader.value = ''; 
                extractBtn.disabled = true; // 隱藏本地按鈕的觸發
                statusText.innerText = "已偵測到 Google 簡報網址，請點擊藍色匯入按鈕。";
                currentMode = 'google';
            }
        });

        // 初始化 Google Identity Services API
        window.onload = function () {
            if (GOOGLE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com') {
                console.warn("請記得將程式碼中的 GOOGLE_CLIENT_ID 替換為您在 GCP 申請的憑證金鑰。");
            }
            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: GOOGLE_CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/drive.readonly',
                    callback: async (tokenResponse) => {
                        if (tokenResponse && tokenResponse.access_token) {
                            accessToken = tokenResponse.access_token;
                            await processGooglePresentation();
                        }
                    },
                });
            } catch (e) {
                console.error("Google SDK 加載失敗，可能處於完全斷網環境或 file 協定限制下。", e);
            }
        };

        // 從網址中解析出 Google Drive File ID
        function extractFileId(url) {
            const matches = url.match(/\/d\/([^/]+)/);
            return matches ? matches[1] : null;
        }

        // 核心文字解析處理調度器
        async function runCoreParser(fileData, isArrayBuffer = false) {
            // ─── 這裡串接你原本的解析邏輯 ───
            // 範例：
            // const text = isArrayBuffer ? await yourBufferParser(fileData) : await yourFileParser(fileData);
            
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve("【本地解析核心成功】\n已成功將二進位資料導進純前端沙盒處理器。\n格式支援：PDF / PPTX 串接就緒。");
                }, 1000);
            });
        }

        // 【方法一處理】本地檔案提取
        extractBtn.addEventListener('click', async () => {
            const file = uploader.files[0];
            if (!file) return;

            statusText.innerText = "正在本地極速解析中...";
            setButtonsDisabled(true);
            outputText.value = "";

            try {
                let parsedText = await runCoreParser(file, false);
                statusText.innerText = "本地檔案文字提取成功！";
                outputText.value = parsedText;
            } catch (error) {
                statusText.innerText = "解析失敗，請確認檔案是否損壞。";
                console.error(error);
            } finally {
                setButtonsDisabled(false);
            }
        });

        // 【方法二處理】Google 簡報按鈕點擊
        googleBtn.addEventListener('click', () => {
            const url = googleUrlInput.value.trim();
            if (!url) {
                statusText.innerText = "請先輸入 Google 簡報網址！";
                return;
            }
            if (!extractFileId(url)) {
                statusText.innerText = "無法解析該網址，請確認是否為標準的 Google 簡報連結。";
                return;
            }

            statusText.innerText = "正在要求 Google 帳號授權...";
            
            // 請求 Google Token，若已有 Token 則靜態刷新
            if (accessToken === null) {
                tokenClient.requestAccessToken({ prompt: 'consent' });
            } else {
                tokenClient.requestAccessToken({ prompt: '' });
            }
        });

        // 執行從 Google 下載並解析簡報
        async function processGooglePresentation() {
            const fileId = extractFileId(googleUrlInput.value.trim());
            statusText.innerText = "已取得授權，正在從雲端安全導流二進位檔...";
            setButtonsDisabled(true);
            outputText.value = "";

            // 使用 Drive API 導出功能，直接在雲端把簡報轉成 PPTX 丟回給前端瀏覽器
            const exportUrl = `https://www.googleapis.com/drive/v3/files/${fileId}/export?mimeType=application/vnd.openxmlformats-officedocument.presentationml.presentation`;

            let arrayBuffer = null;
            try {
                const response = await fetch(exportUrl, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });

                if (!response.ok) throw new Error('雲端匯出失敗，請確認該簡報的權限是否允許唯讀。');

                arrayBuffer = await response.arrayBuffer();
                statusText.innerText = "已直連接收檔案，正在本地解析文字...";

                // 送進本地解析引擎
                let parsedText = await runCoreParser(arrayBuffer, true);
                
                statusText.innerText = "Google 簡報文字提取成功！";
                outputText.value = parsedText;

            } catch (error) {
                statusText.innerText = `錯誤: ${error.message}`;
                console.error(error);
            } finally {
                // 🛡️ 資安優化：垃圾回收（Garbage Collection）防禦
                // 立即將儲存敏感檔案資料的記憶體變數指向 null，防止留存於記憶體被側錄
                arrayBuffer = null; 
                setButtonsDisabled(false);
            }
        }

        function setButtonsDisabled(disabled) {
            extractBtn.disabled = disabled || currentMode !== 'local';
            googleBtn.disabled = disabled;
        }
    </script>
</body>
</html>
